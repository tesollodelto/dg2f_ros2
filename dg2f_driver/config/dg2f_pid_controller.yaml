/**/controller_manager:
  ros__parameters:
    update_rate: 300

    # One PI position controller per joint (output: effort)
    j_1_1_pospid: { type: pid_controller/PidController }
    j_1_2_pospid: { type: pid_controller/PidController }
    j_1_3_pospid: { type: pid_controller/PidController }
    j_2_1_pospid: { type: pid_controller/PidController }
    j_2_2_pospid: { type: pid_controller/PidController }
    j_2_3_pospid: { type: pid_controller/PidController }

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

# ------------- per-joint PI gains -------------
/**/j_1_1_pospid:
  ros__parameters:
    dof_names: ["j_1_1"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_1_1: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_1_2_pospid:
  ros__parameters:
    dof_names: ["j_1_2"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_1_2: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_1_3_pospid:
  ros__parameters:
    dof_names: ["j_1_3"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_1_3: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_2_1_pospid:
  ros__parameters:
    dof_names: ["j_2_1"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_2_1: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_2_2_pospid:
  ros__parameters:
    dof_names: ["j_2_2"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_2_2: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

/**/j_2_3_pospid:
  ros__parameters:
    dof_names: ["j_2_3"]
    command_interface: effort
    reference_and_state_interfaces: ["position"]
    gains:
      j_2_3: { p: 1.5, i: 0.0, d: 0.0, i_clamp_max: 0.0, i_clamp_min: 0.0 }

# Joint State Broadcaster
/**/joint_state_broadcaster:
  ros__parameters:
    update_rate: 300
    joints:
      - j_1_1
      - j_1_2
      - j_1_3
      - j_2_1
      - j_2_2
      - j_2_3
